version: '3.8'

services:
  # Service 1: M-TRACE Dashboard (Analysis Engine)
  dashboard:
    build: .
    container_name: mtrace_dashboard
    ports:
      - "8050:8050"  # Dash Default Port
    volumes:
      # Persist Logs for Analysis (Host <-> Container)
      - ./mtrace_logs:/app/mtrace_logs
      # Mount Config for Dynamic Updates (Per Implementation v4 Section 3.1.4)
      - ./config.yml:/app/config.yml
      # Mount Code for Hot Reloading (Debug Mode)
      - ./t_trace:/app/t_trace
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - MTRACE_MODE=development
    command: python -m t_trace.analysis_engine.dashboard
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Service 2: Experiment Runner (Logging Engine)
  experiments:
    build: .
    container_name: mtrace_experiments
    volumes:
      # Persist Logs
      - ./mtrace_logs:/app/mtrace_logs
      # Mount Config
      - ./config.yml:/app/config.yml
      # Mount Code
      - ./t_trace:/app/t_trace
      - ./experiments:/app/experiments
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - MTRACE_MODE=development
    # Interactive mode for running specific scripts
    stdin_open: true
    tty: true
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]