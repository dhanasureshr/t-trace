version: '3.8'

services:
  dashboard:
    build: .
    container_name: mtrace_dashboard
    ports:
      - "8050:8050"
    volumes:
      - ./mtrace_logs:/app/mtrace_logs
      # Mount config.yml from your actual location
      - ./t_trace/config/config.yml:/app/t_trace/config/config.yml
      - ./t_trace:/app/t_trace
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - TF_CPP_MIN_LOG_LEVEL=2
      - MTRACE_MODE=development
      - MTRACE_PROJECT_ROOT=/app
      - MTRACE_CONFIG_PATH=/app/t_trace/config/config.yml
    command: python -m t_trace.analysis_engine.dashboard
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  experiments:
    build: .
    container_name: mtrace_experiments
    volumes:
      - ./mtrace_logs:/app/mtrace_logs
      # Mount config.yml from your actual location
      - ./t_trace/config/config.yml:/app/t_trace/config/config.yml
      - ./t_trace:/app/t_trace
      - ./experiments:/app/experiments
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - TF_CPP_MIN_LOG_LEVEL=2
      - MTRACE_MODE=development
      - MTRACE_PROJECT_ROOT=/app
      - MTRACE_CONFIG_PATH=/app/t_trace/config/config.yml
    stdin_open: true
    tty: true
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]