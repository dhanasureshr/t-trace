version: '3.8'

services:
  mtrace-experiment:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        - USER_ID=${UID:-1000}
        - GROUP_ID=${GID:-1000}
    user: "${UID}:${GID}"
    image: mtrace:latest
    container_name: mtrace_container
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True 
      - PYTHONUNBUFFERED=1
      - OMP_NUM_THREADS=12 
      - MKL_NUM_THREADS=12
      - TF_CPP_MIN_LOG_LEVEL=2
    volumes:
      # Mount Project Code (Read Only for safety, optional)
      - ../t_trace:/app/mtrace/t_trace
      - ../t_trace/config/config.yml:/app/mtrace/t_trace/config/config.yml:ro
      # Mount Logs (Read/Write - Persist to NVMe SSD)
      - ../mtrace_logs:/app/mtrace/mtrace_logs
      - ../t_trace/experiments:/app/mtrace/experiments
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    stdin_open: true
    tty: true
    # Network Mode: Host (Optional, useful for Dash Dashboard access)
    network_mode: "host"